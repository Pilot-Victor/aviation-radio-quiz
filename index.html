<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>항공무선통신사 기출문제</title>
<style>
  :root{ --bg:#0f1115; --card:#1b1f29; --line:#2a3040; --txt:#e8ecf4;
         --sub:#9aa4b8; --accent:#3b82f6; --accentbg:#1e3a8a;
         --ok:#10b981; --okbg:#0c3324; --no:#ef4444; --nobg:#3a1414; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:17px; line-height:1.6;}
  .wrap{max-width:680px; margin:0 auto; padding:0 14px 130px;}
  header{position:sticky; top:0; background:rgba(15,17,21,.96); backdrop-filter:blur(8px);
    padding:12px 0 10px; z-index:10; border-bottom:1px solid var(--line);}
  h1{font-size:18px; margin:0 0 10px; font-weight:700;}
  .filters{display:flex; gap:8px; flex-wrap:wrap;}
  select{flex:1; min-width:120px; background:var(--card); color:var(--txt);
    border:1px solid var(--line); border-radius:10px; padding:9px 10px; font-size:15px;}
  .bar{height:5px; background:var(--line); border-radius:3px; margin-top:10px; overflow:hidden;}
  .bar > i{display:block; height:100%; background:var(--accent); width:0; transition:.2s;}
  .meta{display:flex; justify-content:space-between; font-size:13px; color:var(--sub); margin-top:8px;}
  .tag{display:inline-block; background:var(--accentbg); color:#cfe0ff; font-size:12px;
    padding:2px 8px; border-radius:20px; margin-right:6px;}
  .tag.g{background:#0c3324; color:#8ff0c4;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px 16px; margin-top:14px;}
  .qnum{color:var(--sub); font-size:13px; margin-bottom:6px;}
  .qtext{font-size:18px; font-weight:600; margin:0 0 12px; white-space:pre-wrap;}
  .qimg{width:100%; border-radius:10px; margin:4px 0 12px; background:#fff;}
  .choices{display:flex; flex-direction:column; gap:10px;}
  .choice{display:flex; align-items:flex-start; gap:10px; text-align:left;
    background:#222838; color:var(--txt); border:1.5px solid var(--line);
    border-radius:12px; padding:13px 14px; font-size:16px; cursor:pointer; width:100%;
    transition:.12s;}
  .choice:active{transform:scale(.99);}
  .choice .ci{flex:0 0 24px; height:24px; border-radius:50%; background:var(--line);
    color:var(--txt); display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; margin-top:1px;}
  .choice img{max-width:100%; border-radius:8px; background:#fff;}
  .choice.sel{border-color:var(--accent); background:#16233d;}
  .choice.sel .ci{background:var(--accent); color:#fff;}
  .choice.correct{border-color:var(--ok); background:var(--okbg);}
  .choice.correct .ci{background:var(--ok); color:#fff;}
  .choice.wrong{border-color:var(--no); background:var(--nobg);}
  .choice.wrong .ci{background:var(--no); color:#fff;}
  .verdict{margin-top:12px; font-weight:700; font-size:15px;}
  .verdict.o{color:var(--ok);} .verdict.x{color:var(--no);}
  .expl{margin-top:10px; background:#12161f; border:1px solid var(--line);
    border-left:3px solid var(--accent); border-radius:8px; padding:11px 13px;
    font-size:14.5px; color:#d3dbe8; line-height:1.65;}
  .expl b{color:#9fc0ff;}
  nav{position:fixed; left:0; right:0; bottom:0; background:rgba(15,17,21,.97);
    backdrop-filter:blur(8px); border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom)); }
  .navin{max-width:680px; margin:0 auto; display:flex; gap:10px; align-items:center;}
  button.nav{flex:1; background:var(--card); color:var(--txt); border:1px solid var(--line);
    border-radius:12px; padding:14px; font-size:16px; font-weight:600;}
  button.nav.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  button.nav:disabled{opacity:.4;}
  .jump{flex:0 0 auto; background:var(--card); border:1px solid var(--line);
    color:var(--txt); border-radius:12px; padding:0 12px; font-size:15px; height:48px; width:70px; text-align:center;}
  .scorebox{background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-top:14px; display:flex; justify-content:space-between; align-items:center;}
  .scorebox b{font-size:20px;}
  .resetbtn{background:transparent; border:1px solid var(--line); color:var(--sub);
    border-radius:8px; padding:6px 12px; font-size:13px;}
  .note{font-size:12px; color:var(--sub); text-align:center; margin-top:16px; line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>&#9992;&#65039; 항공무선통신사 기출 (최근 5개년)</h1>
    <div class="filters">
      <select id="fExam"></select>
      <select id="fSubj"></select>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <div class="meta"><span id="pos"></span><span id="cnt"></span></div>
  </header>
  <div id="score"></div>
  <div id="view"></div>
  <div class="note">
    &#9989; <b>5개 시험 350문항 전체 공식 답지 기준 자동 채점</b>.<br>
    2023-03-11 시험은 문항별 해설(AI 작성 참고용)도 제공됩니다.<br>
    선택/채점 기록은 이 기기에 저장됩니다.
  </div>
</div>
<nav><div class="navin">
  <button class="nav" id="prev">&#8592; 이전</button>
  <input class="jump" id="jump" type="number" min="1" inputmode="numeric" />
  <button class="nav primary" id="next">다음 &#8594;</button>
</div></nav>
<script>
const ALL = [{"exam":"2023-03-11","subj":"전파법규","num":1,"q":"다음 중 무선전화에 의한 조난호출 순서를 맞게 나열한 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m1-qp5hpFfK3Y.gif","ch":["㉠→㉡→㉢→㉣","㉠→㉡→㉣→㉢","㉡→㉠→㉢→㉣","㉡→㉢→㉣→㉠"],"a":3,"e":"조난호출은 'MAYDAY(㉡) 3회'를 가장 먼저 보내고, 이어 '여기는(㉠)'+호출명칭(㉢), 주파수(㉣) 순으로 송신한다. 따라서 ㉡→㉠→㉢→㉣."},{"exam":"2023-03-11","subj":"전파법규","num":2,"q":"다음 중 신고를 통해 개설할 수 있는 무선국에 해당하지 않는 것은?","img":"","ch":["발사하는 전파가 미약한 무선국이나 무선설비의 설치공사를 할 필요가 없는 무선국","송신전용 무선국","전파법에 따라 주파수할당을 받은 자가 전기통신역무 등을 제공하기 위하여 개설하는 무선국","방송법에 따라 이동멀티미디어방송을 위하여 개설하는 무선국"],"a":2,"e":"송신전용 무선국은 '신고'가 아니라 '허가' 대상이다. 미약전파국·주파수할당 역무국·이동멀티미디어방송국 등은 신고로 개설할 수 있다."},{"exam":"2023-03-11","subj":"전파법규","num":3,"q":"다음 중 무선국 개설의 결격사유에 해당되지 않는 것은?","img":"","ch":["대한민국의 국적을 가지지 아니한 자가 항공국을 개설하고자 하는 경우","외국정부 또는 그 대표자가 육상국을 개설하고자 하는 경우","외국의 법인 또는 단체가 해안국 개설하고자 하는 경우","외국의 법인 또는 단체가 과학이나 기술발전을 위한 실험만 사용하는 실험국을 개설하고자 하는 경우"],"a":4,"e":"외국인·외국정부·외국법인은 원칙적으로 개설 결격사유이나, 과학·기술발전을 위한 실험만 하는 실험국은 예외로 허용된다."},{"exam":"2023-03-11","subj":"전파법규","num":4,"q":"다음 중 무선통신의 원칙이 아닌 것은?","img":"","ch":["무선통신의 내용은 필요 최소한의 사항이어야 한다.","무선통신에 사용하는 용어는 가능한 간명하여야 한다.","교신하는 때에는 자국 호출부호·명칭 및 표지부호를 붙여 출처를 명확히 하여야 한다.","교신하는 때에는 정확히 송신하고, 오류를 인지한 때에는 상황에 맞게 정정하여야 한다."],"a":4,"e":"무선통신 원칙은 오류를 인지하면 '즉시' 정정하는 것이다. ④는 '상황에 맞게 정정'으로 바꿔 원칙과 어긋나므로 정답."},{"exam":"2023-03-11","subj":"전파법규","num":5,"q":"다음 중 초단파(VHF, Very High Frequency) 대역(30~300MHz)에서 파장의 길이로 적합한 것은?","img":"","ch":["100m ~ 10m","10m ~ 1m","1m ~ 10cm","10cm ~ 1cm"],"a":2,"e":"파장 λ = 광속(3×10^8)/주파수. 30MHz는 10m, 300MHz는 1m이므로 VHF 대역 파장은 10m~1m."},{"exam":"2023-03-11","subj":"전파법규","num":6,"q":"항공기국 무선설비 검사 시 명백한 위반사항이 관찰된 경우 국제전파규칙(RR)에서 규정하는 통보방법으로 옳은 것은?","img":"","ch":["구두로 직접 통보한다.","전화로 통보한다.","서면으로 통보한다.","문저전송으로 통보한다."],"a":3,"e":"국제전파규칙(RR)은 무선설비 검사에서 명백한 위반사항이 관찰되면 '서면'으로 통보하도록 규정한다."},{"exam":"2023-03-11","subj":"전파법규","num":7,"q":"다음 중 무선국 개설허가의 유효기간은?","img":"","ch":["7년 이내","10년 이내","15년 이내","20년 이내"],"a":1,"e":"전파법상 무선국 개설허가의 유효기간은 7년 이내다."},{"exam":"2023-03-11","subj":"전파법규","num":8,"q":"다음 중 항공기국이 항공국과 무선전화에 의한 시험통신을 행하는 경우 가장 먼저 송신하여야 하는 것은?","img":"","ch":["상대국의 호출부호","자국의 호출부호","사용하고 있는 주파수","명료도"],"a":1,"e":"호출 시에는 상대국(피호출국)의 호출부호를 가장 먼저 보내고, 그다음 자국 호출부호를 송신한다."},{"exam":"2023-03-11","subj":"전파법규","num":9,"q":"항공기국이 항행 중 항공국과 1차 이상 연락하지 않은 경우의 무선종사자 행정처분 기준은?","img":"","ch":["업무종사 정지 3개월","업무종사 정지 6개월","업무종사 정지 1년","기술자격 취소"],"a":2,"e":"항공기국이 항행 중 항공국과 한 차례도 연락하지 않으면 무선종사자는 업무종사 정지 6개월의 행정처분을 받는다."},{"exam":"2023-03-11","subj":"전파법규","num":10,"q":"다음 중 빈 칸에 들어갈 것으로 알맞은 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m10-Vibi8i1amP.gif","ch":["2개월","4개월","6개월","12개월"],"a":3,"e":"무선국 준공검사에 불합격하면 통보받은 날부터 6개월 이내에 재검사를 받아야 한다."},{"exam":"2023-03-11","subj":"전파법규","num":11,"q":"다음 중 빈칸에 들어갈 것으로 알맞은 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m11-2UHOqMUIRe.gif","ch":["3%","5%","10%","15%"],"a":3,"e":"무선설비 운용 전원은 정격전압을 기준으로 상하 10% 이내의 오차범위를 유지해야 한다."},{"exam":"2023-03-11","subj":"전파법규","num":12,"q":"다음의 항공무선업무 관련 국제전파규칙의 괄호 안에 들어갈 것으로 맞는 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m12-cqPlj4awxp.gif","ch":["A : 허가장, B : 1인의 정비사","A : 허가장, B : 2인의 정비사","A : 자격증, B : 1인의 통신사","A : 자격증, B : 2인의 통신사"],"a":3,"e":"모든 항공기국 업무는 주관청이 발급한 '자격증' 소지자가, '1인의 통신사'에 의해 관리·통제되어야 한다."},{"exam":"2023-03-11","subj":"전파법규","num":13,"q":"항공기구의 항행 중 무선전화 통화에서 호출부호 사용의 약어화에 대한 설명으로 옳지 않은 것은?","img":"","ch":["항공기국은 통신연락이 설정된 후 혼동될 우려가 없는 경우에는 호출부호를 대신하여 약어를 사용할 수 있다.","호출 약어는 항공기 등록기호의 최초 문자와 끝의 2문자","호출 약어는 통신연락 중에 변경할 수 있다.","호출 약어는 세자리 지정문자와 등록기호 끝의 2문자"],"a":3,"e":"호출 약어는 통신연락 '중에는 변경할 수 없다'. ③이 이를 변경 가능하다고 해 틀린 설명이다."},{"exam":"2023-03-11","subj":"전파법규","num":14,"q":"다음 중 항공기무선국의 검사 항목이 아닌 것은?","img":"","ch":["ADF","DME","TCAS","ELT"],"a":1,"e":"DME·TCAS·ELT는 항공기무선국 검사 항목이나, ADF는 해당 검사 항목에 포함되지 않는다."},{"exam":"2023-03-11","subj":"전파법규","num":15,"q":"다음 중 “선박 또는 항공기의 외국의 각 지역을 항행 중이어서 무선종사자의 승무가 불가능한 경우로서 무선종사자가 아닌 자가 무선설비를 운용할 수 있는 범위”로 옳은 것은?","img":"","ch":["운항통신","출입권 통지","안전통신","기기의 조정"],"a":3,"e":"종사자 승무가 불가능한 경우, 무자격자는 '안전통신'에 한하여 무선설비를 운용할 수 있다."},{"exam":"2023-03-11","subj":"전파법규","num":16,"q":"다음 중 빈칸에 들어갈 것으로 알맞은 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m16-JlWHQz6Ifj.gif","ch":["5W","10W","20W","50W"],"a":2,"e":"안테나 공급전력이 10W를 초과하는 무선설비 전원회로에는 퓨즈 또는 자동차단기를 설치해야 한다."},{"exam":"2023-03-11","subj":"전파법규","num":17,"q":"다음 중 전파의 성질과 가장 거리가 먼 것은?","img":"","ch":["직진성","반사성","굴절성","투과성"],"a":4,"e":"전파는 직진·반사·굴절 성질을 가진다. '투과성'은 전파의 대표적 성질로 보기 어려워 거리가 멀다."},{"exam":"2023-03-11","subj":"전파법규","num":18,"q":"전파규칙의 항공업무 무선전화통신사 한정자격증 취득을 위한 입증사항이 아닌 것은?","img":"","ch":["무선전화장치의 실제 조작과 조정에 관한 상세 지식","공용언어를 이용한 무선전화의 정확한 송수신 능력","인명안전 관련 통신의 상세한 지식","무선전화 운용과 운용절차의 실무지식"],"a":1,"e":"한정자격은 운용·절차·안전통신 지식을 요구한다. '무선전화장치의 실제 조작·조정에 관한 상세 지식'까지는 입증사항이 아니다."},{"exam":"2023-03-11","subj":"전파법규","num":19,"q":"다음 중 스퓨리어스발사에 포함되지 않는 것은?","img":"","ch":["대역외발사","고조파발사","기생발사","상호변조"],"a":1,"e":"스퓨리어스 발사는 고조파·기생·상호변조 발사 등을 말하며, '대역외발사'는 이와 별도로 구분된다."},{"exam":"2023-03-11","subj":"전파법규","num":20,"q":"다음 중 의무항공기국 전원의 작동 요건이 아닌 것은?","img":"","ch":["항행 중 초단파대 무선전화 작동","항행 중 2차감시레이다용 트랜스폰더 작동","항행 중 로칼라이져 작동","예비전원용 축전지 충전"],"a":3,"e":"로칼라이저는 지상에 설치되는 착륙 유도시설로, 항공기에 탑재해 항행 중 작동시키는 전원 요건이 아니다."},{"exam":"2023-03-11","subj":"기초전파공학","num":21,"q":"다음 중 송신기의 성능조건으로 틀린 것은?","img":"","ch":["송신되는 주파수는 유동적이어야 한다.","스퓨리어스 발사의 강도는 가능한 적어야 한다.","변조 직진성이 좋아야 한다.","신호파에 대한 변조도의 주파수 특성이 좋아야 한다."],"a":1,"e":"송신 주파수는 '유동적'이 아니라 '안정적'이어야 한다. ①이 반대로 서술해 틀린 조건이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":22,"q":"다음 중 파라볼라안테나에 대한 설명으로 틀린 것은?","img":"","ch":["극초단파대 이상 마이크로파 대역의 안테나 중 가장 많이 사용된다.","고정통신용, 선박용 레이다, 위성통신용 등에 사용된다.","포물면 반사기와 그 초점에 1차 복사기의 구조로 되어 있다.","전송효율을 높이기 위해 로딩코일이 필요하다."],"a":4,"e":"파라볼라 안테나는 포물면 반사기와 초점의 1차 복사기로 구성된다. 로딩코일은 필요 없어 ④가 틀리다."},{"exam":"2023-03-11","subj":"기초전파공학","num":23,"q":"다음 중 AM수신기의 안정도를 저해하는 원인으로 볼 수 없는 것은?","img":"","ch":["항온과 항습","기압의 변화","전원전압의 변동","기계적 진동 및 충격"],"a":1,"e":"항온·항습은 오히려 수신기 안정도를 '유지'시키는 조건이다. 안정도를 저해하는 원인이 아니다."},{"exam":"2023-03-11","subj":"기초전파공학","num":24,"q":"계기착륙시설의 마아커 비콘에는 내측 마아커, 중앙 마아커, 외측 마아커가 있다. 내측 마아커의 변조 주파수는?","img":"","ch":["1,000[Hz]","3,000[Hz]","5,000[Hz]","8,000[Hz]"],"a":2,"e":"마커비콘 변조주파수는 외측 400Hz, 중앙 1300Hz, 내측 3000Hz이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":25,"q":"전파가 둘 이상의 통로를 거쳐 수신되는 경우, 동일 신호가 몇 회 되풀이하여 나타나는 전파현상을 무엇이라고 하는가?","img":"","ch":["에코(Echo) 현상","페이딩(Fading)","덕트(Duct)","초굴절"],"a":1,"e":"전파가 둘 이상의 경로로 수신돼 동일 신호가 되풀이되는 현상은 에코(반향, Echo)이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":26,"q":"다음 중 수정 발진기의 특징으로 적합하지 않은 것은?","img":"","ch":["주파수 안정도가 좋다.","기계적으로나 물리적으로 안정하다.","수정 진동자의 Q(선택도)가 매우 낮다.","발진조건을 만족하는 유도성 주파수 범위가 대단히 좁다."],"a":3,"e":"수정 진동자는 Q(선택도)가 매우 '높아' 주파수 안정도가 우수하다. ③이 낮다고 해 틀린 설명이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":27,"q":"측정값이 참값과 어느 정도 일치하는가 하는 정도를 나타내는 값은?","img":"","ch":["감도","확도","정도","오차"],"a":2,"e":"측정값이 참값에 얼마나 가까운가를 나타내는 값은 확도(정확도)이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":28,"q":"다음은 AM 수신기의 종합특성에 대한 설명이다. ( ) 안에 들어갈 내용으로 알맞은 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m28-byr8DfBsit.gif","ch":["감도","선택도","충실도","안정도"],"a":3,"e":"수신된 통신내용을 원래 신호에 가깝게 재생하는 능력은 '충실도'다."},{"exam":"2023-03-11","subj":"기초전파공학","num":29,"q":"다음 중 스펙트럼분석기로 측정할 수 없는 것은?","img":"","ch":["주파수","고조파","위상차","변조도"],"a":3,"e":"스펙트럼분석기는 주파수·고조파·변조도는 측정할 수 있으나 '위상차'는 측정할 수 없다."},{"exam":"2023-03-11","subj":"기초전파공학","num":30,"q":"다음 중 정류회로와 맥동률이 올바르게 연결된 것은?","img":"","ch":["단상 반파 정류회로 – 131[%]","단상 전파 정류회로 – 58.2[%]","3상 반파 정류회로 – 28.3[%]","3상 전파 정류회로 – 4.2[%]"],"a":4,"e":"3상 전파 정류회로는 맥동률이 약 4%로 가장 낮다. 나머지 보기는 맥동률 수치가 잘못 연결되었다."},{"exam":"2023-03-11","subj":"기초전파공학","num":31,"q":"원하는 신호대역의 전력과 인접해 있는 불필요 전력과의 비율 측정시 사용되는 단위는?","img":"","ch":["[dBc]","[dBm]","[dBw]","[dBμV]"],"a":1,"e":"반송파(신호) 대비 인접 불필요 전력의 비율은 dBc 단위로 나타낸다."},{"exam":"2023-03-11","subj":"기초전파공학","num":32,"q":"다음 중 항공기의 항행안전을 위해 의무항공기국에 설치하는 예비전원의 최소 작동시간은?","img":"","ch":["30분","45분","60분","90분"],"a":1,"e":"의무항공기국의 예비전원(축전지)은 최소 30분 이상 작동할 수 있어야 한다."},{"exam":"2023-03-11","subj":"기초전파공학","num":33,"q":"전방향표지시설(VOR)의 부반송파 주파수로 적합한 것은?","img":"","ch":["3,000[Hz]","9,960[Hz]","10,000[Hz]","20,000[Hz]"],"a":2,"e":"VOR(전방향표지시설)의 부반송파(subcarrier) 주파수는 9,960Hz이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":34,"q":"항공기에 탑재하는 2차감시레이다용 트랜스폰더(응답기)의 모드 A는 어떤 정보 신호인가?","img":"","ch":["식별정보","고도정보","속도정보","거리정보"],"a":1,"e":"2차감시레이다(SSR) 트랜스폰더의 모드 A는 '식별정보(코드)'를, 모드 C는 고도정보를 전송한다."},{"exam":"2023-03-11","subj":"기초전파공학","num":35,"q":"다음 중 주파수와 파장에 대한 설명으로 적합하지 않은 것은?","img":"","ch":["주파수는 1초 동안에 진동한 횟수를 의미한다.","자유공간 내에서 전파의 속도는 빛의 속도와 같다.","파장이란 전파가 한 번 진동할 때 진행하는 거리이다.","주파수가 높은 전파는 파장이 길고, 낮은 전파는 파장이 짧다."],"a":4,"e":"주파수와 파장은 반비례한다. ①②③은 모두 옳은 설명이고, ④는 '주파수가 높으면 파장이 길다'고 했으나 실제로는 주파수가 높을수록 파장이 짧아지므로 틀린 설명이다. 따라서 정답은 ④."},{"exam":"2023-03-11","subj":"기초전파공학","num":36,"q":"우주무선통신에 많이 사용하는 통신방식은?","img":"","ch":["FDM(Frequency Division Multiplexing)","TDM(Time Division Multiplexing)","CDM(Code Division Multiplexing)","QAM(Quadrature Amplitude Modulation)"],"a":2,"e":"우주무선통신에는 시분할다중방식(TDM, Time Division Multiplexing)이 많이 사용된다."},{"exam":"2023-03-11","subj":"기초전파공학","num":37,"q":"태양폭발, 태양흑점의 활동, 코로나 등에 의한 열적 교란 현상으로 생긴다고 여겨지는 잡음은 무엇인가?","img":"","ch":["대기잡음","태양잡음","우주잡음","인공잡음"],"a":2,"e":"태양흑점 활동·코로나 등 태양의 열적 교란으로 생기는 잡음은 '태양잡음'이다."},{"exam":"2023-03-11","subj":"기초전파공학","num":38,"q":"항공교통관제에 관한 통신(117.975MHz~137MHz)을 하는 항공국과 항공기국용 무선설비의 주파수 전환은 몇[초] 이내여야 하는가?","img":"","ch":["8[초] 이내","30[초] 이내","40[초] 이내","50[초] 이내"],"a":1,"e":"항공교통관제용(117.975~137MHz) 무선설비의 주파수 전환은 8초 이내여야 한다."},{"exam":"2023-03-11","subj":"기초전파공학","num":39,"q":"항공기국이 항공국을 호출하여 응답이 없는 경우 재호출 경과 시간은?","img":"","ch":["3[초] 이상","5[초] 이상","8[초] 이상","10[초] 이상"],"a":4,"e":"항공기국이 호출했으나 응답이 없으면 10초 이상 경과한 뒤에 재호출한다."},{"exam":"2023-03-11","subj":"기초전파공학","num":40,"q":"다음 중 빛을 받으면 전류가 발생하는 다이오드는?","img":"","ch":["포토 다이오드","발광 다이오드","제너 다이오드","정류 다이오드"],"a":1,"e":"빛을 받으면 전류가 발생(광→전기 변환)하는 소자는 포토 다이오드이다."},{"exam":"2023-03-11","subj":"통신보안","num":41,"q":"다음 중 (가)와 (나)에 들어갈 용어로 알맞은 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m41-kvn7jc9bNJ.gif","ch":["(가) 관리자 - (나) 연출","(가) 책임자 - (나) 관리","(가) 관리자 - (나) 감독","(가) 책임자 - (나) 연출"],"a":2,"e":"통신보안은 무선국 운용감독 및 관리 등 통신보안 전반에 '책임'을 맡은 '책임자'를 말한다. (가)책임자·(나)관리."},{"exam":"2023-03-11","subj":"통신보안","num":42,"q":"다음 중 통신보안교육 대상자가 아닌 자는?","img":"","ch":["아마추어 무선국을 개설·운용하는 자","이동통신사에서 개설한 기지국에 종사하는 자","경찰서 소유 무선국에 종사하는 자","기업체 소유 무선국에 종사하는 자"],"a":3,"e":"아마추어·이동통신 기지국·기업체 무선국 종사자는 통신보안교육 대상이나, 보기 중 경찰서 소유 무선국 종사자는 이 교육 대상에서 제외된다."},{"exam":"2023-03-11","subj":"통신보안","num":43,"q":"선박의 긴급상황 발생 시 아국 선박임을 확인하거나, 상대 선박이 의심스러울 때 아국 선박인지 여부를 확인하기 위하여 사용하는 부호를 의미하는 것은?","img":"","ch":["무선국명","선박확인부호","호출명칭","고유식별부호"],"a":2,"e":"긴급상황에서 아국 선박 여부를 확인하기 위해 사용하는 부호는 '선박확인부호'다."},{"exam":"2023-03-11","subj":"통신보안","num":44,"q":"다음 문장의 괄호 안에 공통으로 들어갈 알맞은 것은?","img":"https://www.kinz.kr/data/exam/ZzgRx1wTm/hr20230311m44-9x0e4_hU0Z.gif","ch":["약호자재","암호자재","약어자재","통신자재"],"a":2,"e":"Ⅰ·Ⅱ·Ⅲ급 비밀 소통을 위해 암호기술을 적용해 만든 장치·수단은 '암호자재'다."},{"exam":"2023-03-11","subj":"통신보안","num":45,"q":"발신 전문의 사전 보안성 검토 절차 중 적절한 것은?","img":"","ch":["보안성 검토 및 발신방법 저장 → 보안담당관 검토 → 문서통제관 확인 → 전문발송차 최종 검토","보안담당관 지정 → 보안담당관 검토 및 발신방법 검토 → 전문발송자 확인 → 문서통제관 최종 검토","전문발송자 지정 → 문서통제관 검토 → 보안성 검토 및 발신방법 확인 → 보안담당관 최종 검토","문서통제관 지정 → 전문발송자 검토 → 보안담당관 최종 확인 → 보안성 검토 및 발신방법 확인"],"a":1,"e":"사전 보안성 검토는 '보안성 검토·발신방법 저장 → 보안담당관 검토 → 문서통제관 확인 → 전문발송자 최종 검토' 순으로 진행한다."},{"exam":"2023-03-11","subj":"통신보안","num":46,"q":"다음 중 통신정보에 해당하는 것은?","img":"","ch":["지방자치단체의 노인복지제도 홍보","전자회사의 TV 신제품 광고","판매 중인 하이브리드차의 일반 제원","한국형 구축함(KDX-1)의 설계도"],"a":4,"e":"한국형 구축함(KDX-1) 설계도처럼 국가안보와 직결된 정보가 '통신정보'에 해당한다. 광고·홍보·일반 제원은 아니다."},{"exam":"2023-03-11","subj":"통신보안","num":47,"q":"다음 중 암호자재의 긴급파기에 대한 설명으로 틀린 것은?","img":"","ch":["암호자재의 긴급파기 계획은 평상시에 수립되어 있어야 한다.","사용 중인 암호자재를 계속 보유할 수 없을 때에는 배부처가 적은 것부터 파기한다.","긴급사태가 발생하였을 때 사용기간이 끝난 암호자재, 예비용 암호자재 및 사용 중인 암호자재 순으로 파기한다.","암호자재를 관리·운용하는 사람은 긴급사태 발생으로 암호자재를 안전하게 보호할 수 없는 경우에는 파기할 수 있다."],"a":2,"e":"암호자재 긴급파기는 배부처가 '많은(더 중요한)' 것부터 파기한다. ②는 적은 것부터라 해 틀린 설명이다."},{"exam":"2023-03-11","subj":"통신보안","num":48,"q":"유선통신의 경우 그 선로자체에 도청장치를 직접 또는 간접적으로 접속하여 통신 내용을 수집하며, 무선통신은 전파가 미치는 범위 어느 곳에서든지 같은 방식의 수신기 설치로 통한 내용의 수집이 가능하다. 이것이 설명하는 통신정보의 유출 유형이 아닌 것은?","img":"","ch":["통신소침투","교신분석","방향탐지","방해통신"],"a":1,"e":"지문은 선로 도청·수신을 통한 정보수집(감청)을 설명한다. 통신소에 직접 침투하는 방식은 이에 해당하지 않는다."},{"exam":"2023-03-11","subj":"통신보안","num":49,"q":"유선통신(유선전화)의 보안대책으로 적절하지 않은 것은?","img":"","ch":["주요 내용은 암호화","주요 내용은 보안장비 사용","가공선로는 지상에 매설","주기적인 선로(단자판 등) 보호 철저"],"a":3,"e":"가공선로는 지상에 노출하지 말고 지하에 매설해야 보안에 유리하다. ③은 '지상에 매설'이라 해 부적절하다."},{"exam":"2023-03-11","subj":"통신보안","num":50,"q":"데이터통신 내용에 해당하지 않는 것은?","img":"","ch":["일시에 대량 전송이 가능하므로 풍부한 정보제공의 원천이 된다.","암호장비·암호프로그램 등의 개발 및 적용 노력이 부족할 수 있다.","통신선로 또는 중간단자 등에서 도청이 가능하다.","보안의식이 강조되어 비밀 사항을 평문으로 소통할 가능성이 적다."],"a":4,"e":"데이터통신은 평문 소통으로 비밀이 노출될 위험이 있다. ④의 '평문 소통 가능성이 적다'는 특성과 맞지 않는다."},{"exam":"2023-03-11","subj":"영어","num":51,"q":"When may an aircraft discontinue reporting over compulsory reporting points?","img":"","ch":["After the first fix","Any time","After receiving the statement “redar contact” from ATC","None of the above"],"a":3,"e":"ATC로부터 'radar contact' 통보를 받으면 의무보고지점에서의 위치 보고를 생략(중단)할 수 있다."},{"exam":"2023-03-11","subj":"영어","num":52,"q":"Which of the following spoken figure code is false?","img":"","ch":["0 : NAH-DAH-ZAY-ROH","3 : TAY-RAH-TREE","4 : PAN-TAH-FOWER","7 : SAY-TAY-SEVEN"],"a":3,"e":"숫자 4의 표준 발음은 'FOW-er'이다. 'PAN-TAH-FOWER'는 잘못된 표기라 거짓이다."},{"exam":"2023-03-11","subj":"영어","num":53,"q":"무선국이 지정된 조건에서 무선 주파수 또는 무선 주파수 채널을 사용할 수 있도록 주관청에서 부여하는 권한은 무엇인가?","img":"","ch":["radiocommunication service","radiolocation","allotment","assignment"],"a":4,"e":"특정 무선국이 지정 조건에서 주파수를 쓰도록 주관청이 부여하는 권한은 assignment(지정)다. allotment는 지역·업무에의 분배."},{"exam":"2023-03-11","subj":"영어","num":54,"q":"약어 “QDM”의 올바른 해석은 다음 중 무엇인가?","img":"","ch":["Magnetic Heading(zero wind)","Atmospheric pressure at aerodrome elevation","Atmospheric pressur ,{"exam":"2018-03-10","subj":"영어","num":66,"q":"다음 문장의 밑줄 친 단어와 같은 의미를 가지는 것은?","img":"https://www.kinz.kr/data/exam/nSWV4Z46Hg/hr20180310m66-3tilekl_Gz3.gif","ch":["Landing","Captain","Leaving","Number"],"a":1,"e":null},{"exam":"2018-03-10","subj":"영어","num":67,"q":"항공통신 용어 중 관제사가 “주파수 변경을 허가 한다‘를 지시할 때 사용하는 용어로 알맞은 것은?","img":"","ch":["FREQUENCY UNUSABLE","REMAIN THIS FREQUENCY","CHANGE TO BY FREQUENCY","FREQUENCY CHANGE APPROVED"],"a":4,"e":null},{"exam":"2018-03-10","subj":"영어","num":68,"q":"다음 문장의 괄호 안에 들어갈 가장 적합한 것은?","img":"https://www.kinz.kr/data/exam/nSWV4Z46Hg/hr20180310m68-GQreuqZEDUQ.gif","ch":["Lima","Lost","Latin","Letter"],"a":1,"e":null},{"exam":"2018-03-10","subj":"영어","num":69,"q":"다음 문장의 밑줄 친 부분에 알맞은 단어는?","img":"","ch":["UN","ICAO","IAEA","NOTAM"],"a":2,"e":null},{"exam":"2018-03-10","subj":"영어","num":70,"q":"다음 내용이 설명하는 항공용어는 무엇 인가?","img":"https://www.kinz.kr/data/exam/nSWV4Z46Hg/hr20180310m70-C9nSovIOHGN.gif","ch":["Alternate aerodrome","Supplement aerodrome","Amendment aerodrome","International aerodrome"],"a":1,"e":null}];
const $=s=>document.querySelector(s);
let pool=ALL, idx=0;
const SELKEY='kinz_air_sel2';
let sel=JSON.parse(localStorage.getItem(SELKEY)||'{}');
function keyOf(q){return q.exam+'#'+q.subj+'#'+q.num;}
function save(){localStorage.setItem(SELKEY,JSON.stringify(sel));}
function buildFilters(){
  const exams=[...new Set(ALL.map(d=>d.exam))].sort().reverse();
  const subjs=[...new Set(ALL.map(d=>d.subj))];
  $('#fExam').innerHTML=exams.map(e=>{
    const graded=ALL.some(d=>d.exam===e&&d.a);
    return '<option value="'+e+'">'+e+(graded?' ✅':'')+'</option>';}).join('');
  $('#fExam').insertAdjacentHTML('afterbegin','<option value="">전체 시험</option>');
  $('#fSubj').innerHTML='<option value="">전체 과목</option>'+
    subjs.map(s=>'<option value="'+s+'">'+s+'</option>').join('');
}
function applyFilter(){
  const e=$('#fExam').value, s=$('#fSubj').value;
  pool=ALL.filter(d=>(!e||d.exam===e)&&(!s||d.subj===s));
  idx=0; renderScore(); render();
}
function renderScore(){
  const graded=pool.filter(q=>q.a);
  if(!graded.length){$('#score').innerHTML='';return;}
  const done=graded.filter(q=>sel[keyOf(q)]!=null);
  const correct=done.filter(q=>sel[keyOf(q)]===q.a).length;
  const pct=done.length?Math.round(correct/done.length*100):0;
  $('#score').innerHTML='<div class="scorebox"><span>채점 <b>'+correct+'</b> / '+done.length+
    ' <span style="color:var(--sub)">(푼 문제 기준 '+pct+'점)</span></span>'+
    '<button class="resetbtn" id="reset">기록 초기화</button></div>';
  $('#reset').onclick=()=>{ if(confirm('이 조건의 선택 기록을 지울까요?')){
    pool.forEach(q=>delete sel[keyOf(q)]); save(); renderScore(); render(); }};
}
function esc(t){return t.replace(/</g,'&lt;');}
function render(){
  if(!pool.length){$('#view').innerHTML='<div class="card">해당 조건의 문제가 없습니다.</div>';return;}
  idx=Math.max(0,Math.min(idx,pool.length-1));
  const q=pool[idx], k=keyOf(q), picked=sel[k], graded=!!q.a, answered=picked!=null;
  const circ=['①','②','③','④','⑤'];
  let chHtml=q.ch.map((c,i)=>{
    const n=i+1, isImg=c.indexOf('[이미지]')===0;
    const body=isImg? c.replace('[이미지]','').trim().split(' ').map(u=>'<img src="'+u+'">').join('') : esc(c);
    let cls='';
    if(graded && answered){ if(n===q.a) cls='correct'; else if(n===picked) cls='wrong'; }
    else if(!graded && picked===n){ cls='sel'; }
    return '<button class="choice '+cls+'" data-n="'+n+'"><span class="ci">'+circ[i]+'</span><span>'+body+'</span></button>';
  }).join('');
  const img=q.img? '<img class="qimg" src="'+q.img+'" loading="lazy">':'';
  let after='';
  if(graded && answered){
    after += picked===q.a
      ? '<div class="verdict o">✅ 정답입니다 (정답: '+circ[q.a-1]+')</div>'
      : '<div class="verdict x">❌ 오답 &mdash; 정답은 '+circ[q.a-1]+'번</div>';
    if(q.e) after += '<div class="expl"><b>해설</b> &middot; '+esc(q.e)+'</div>';
  }
  $('#view').innerHTML='<div class="card"><div class="qnum"><span class="tag">'+q.exam+'</span>'+
    '<span class="tag '+(graded?'g':'')+'">'+q.subj+'</span>'+q.num+'번</div>'+
    '<p class="qtext">'+esc(q.q)+'</p>'+img+'<div class="choices">'+chHtml+'</div>'+after+'</div>';
  document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{
    const n=+b.dataset.n;
    sel[k]= (sel[k]===n && !graded) ? undefined : n;
    if(sel[k]===undefined) delete sel[k];
    save(); renderScore(); render();
  });
  $('#prog').style.width=((idx+1)/pool.length*100)+'%';
  $('#pos').textContent=(idx+1)+' / '+pool.length;
  $('#cnt').textContent='선택함 '+pool.filter(x=>sel[keyOf(x)]!=null).length;
  $('#prev').disabled=idx===0; $('#next').disabled=idx===pool.length-1;
  $('#jump').value=idx+1; $('#jump').max=pool.length;
  window.scrollTo({top:0,behavior:'smooth'});
}
$('#prev').onclick=()=>{idx--;render();};
$('#next').onclick=()=>{idx++;render();};
$('#jump').onchange=()=>{idx=(+$('#jump').value||1)-1;render();};
$('#fExam').onchange=applyFilter; $('#fSubj').onchange=applyFilter;
buildFilters();
$('#fExam').value='2023-03-11'; applyFilter();
</script>
</body>
